; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html




[env:4d_systems_esp32s3_gen4_r8n16_sin_boot]
platform = espressif32
board = 4d_systems_esp32s3_gen4_r8n16
framework = arduino
upload_protocol = esp-builtin
upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
board_build.usb_mode = cdc
board_build.usb_cdc_on_boot = 1

custom_ip_oct1 = 192
custom_ip_oct2 = 168
custom_ip_oct3 = 1
custom_ip_oct4 = 200

build_flags = 
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1

    -DIP_OCT1=${this.custom_ip_oct1}
    -DIP_OCT2=${this.custom_ip_oct2}
    -DIP_OCT3=${this.custom_ip_oct3}
    -DIP_OCT4=${this.custom_ip_oct4}
	-DCONFIG_PM_ENABLE=1
    -DCONFIG_PM_DFS_INIT_AUTO=1


lib_deps = 
	adafruit/Adafruit BusIO
	sciosense/ScioSense_ENS16x@^2.0.3
	painlessmesh/painlessMesh@^1.5.4
	sensirion/Sensirion I2C SHT4x@^1.1.2
	knolleary/PubSubClient@^2.8



